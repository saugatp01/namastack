<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded background so it pops on any tab color -->
  <rect width="32" height="32" rx="7" fill="#1e1b4b"/>

  <!-- Three stacked arcs — thicker for small size legibility -->
  <!-- Arc 1: top, narrowest -->
  <path
    d="M 11,13 Q 16,6 21,13"
    stroke="#a5b4fc"
    stroke-width="2.8"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Arc 2: middle -->
  <path
    d="M 8,19 Q 16,11 24,19"
    stroke="#818cf8"
    stroke-width="2.8"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Arc 3: bottom, widest -->
  <path
    d="M 5,25 Q 16,15.5 27,25"
    stroke="#6366f1"
    stroke-width="2.8"
    stroke-linecap="round"
    fill="none"
  />
</svg>
