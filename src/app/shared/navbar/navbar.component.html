<header [class]="scrolled()
    ? 'fixed top-0 inset-x-0 z-50 transition-all duration-300 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm'
    : 'fixed top-0 inset-x-0 z-50 transition-all duration-300 bg-white/70 backdrop-blur-sm'">

  <nav class="max-w-7xl mx-auto px-6 lg:px-8 flex items-center justify-between h-[66px]">

    <!-- Logo -->
    <a routerLink="/" (click)="closeMenu()" class="flex items-center gap-2.5 group">
      <img src="logo.svg" alt="Namastack" class="w-8 h-8 transition-transform duration-300 group-hover:scale-110" />
      <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; color: #0f172a;">Namastack</span>
    </a>

    <!-- Desktop links -->
    <ul class="hidden md:flex items-center gap-1 list-none">
      <li>
        <a routerLink="/" routerLinkActive="!text-brand-600" [routerLinkActiveOptions]="{exact:true}"
           class="px-4 py-2 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-50 text-sm font-semibold transition-all">Home</a>
      </li>
      <li>
        <a routerLink="/services" routerLinkActive="!text-brand-600"
           class="px-4 py-2 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-50 text-sm font-semibold transition-all">Services</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="!text-brand-600"
           class="px-4 py-2 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-50 text-sm font-semibold transition-all">About</a>
      </li>
    </ul>

    <div class="hidden md:block">
      <a routerLink="/contact" class="ns-btn ns-btn-primary" style="padding:.625rem 1.375rem; font-size:.85rem;">
        Contact Us
      </a>
    </div>

    <!-- Mobile toggle -->
    <button (click)="toggleMenu()" aria-label="Menu"
      class="md:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors">
      @if (menuOpen()) {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      } @else {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      }
    </button>
  </nav>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <div class="md:hidden bg-white border-t border-slate-100 px-6 py-4 flex flex-col gap-1">
      <a routerLink="/" (click)="closeMenu()" class="px-4 py-2.5 rounded-lg text-slate-600 hover:text-slate-900 hover:bg-slate-50 font-semibold text-sm transition-all">Home</a>
      <a routerLink="/services" (click)="closeMenu()" class="px-4 py-2.5 rounded-lg text-slate-600 hover:text-slate-900 hover:bg-slate-50 font-semibold text-sm transition-all">Services</a>
      <a routerLink="/about" (click)="closeMenu()" class="px-4 py-2.5 rounded-lg text-slate-600 hover:text-slate-900 hover:bg-slate-50 font-semibold text-sm transition-all">About</a>
      <div class="pt-2 border-t border-slate-100 mt-1">
        <a routerLink="/contact" (click)="closeMenu()" class="ns-btn ns-btn-primary w-full justify-center text-sm" style="padding:.7rem 1rem;">Contact Us</a>
      </div>
    </div>
  }
</header>
